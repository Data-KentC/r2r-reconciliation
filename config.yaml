# =============================================================================
# R2R INTERCOMPANY RECONCILIATION ENGINE
# config.yaml — Single source of truth for all parameters
# =============================================================================
# INSTRUCTIONS FOR USE:
# 1. Update all TODO items before first real run
# 2. Never hardcode values in Python — always read from here
# 3. Any change to this file requires a Pull Request approval
#    (enforced by .github/CODEOWNERS once that file is created)
# 4. Update last_verified_date every 90 days — see governance section
# =============================================================================

# -----------------------------------------------------------------------------
# SYSTEM IDENTITY
# -----------------------------------------------------------------------------
system:
  name:             "R2R Intercompany Reconciliation Engine"
  version:          "1.0.0"
  environment:      "prototype"          # prototype | production
  owner:            "Data-KentC"
  built_by:         "Kent — Singapore CA, APAC Controller"

# -----------------------------------------------------------------------------
# ENTITIES
# All 5 APAC entities. Add new entities here — no code changes needed.
# -----------------------------------------------------------------------------
