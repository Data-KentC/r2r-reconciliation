    primary_controller: "sg_controller@anthrotic.com"    # TODO: real email
    backup_controller:  "sg_backup@anthrotic.com"        # TODO: real email
    telegram_chat_id:   ""                               # TODO: Telegram setup
    active:             true

  ANTH-AU:
    name:               "Anthrotic Australia"
    currency:           "AUD"
    functional_currency: "AUD"
    primary_controller: "au_controller@anthrotic.com"    # TODO: real email
    backup_controller:  "au_backup@anthrotic.com"        # TODO: real email
    telegram_chat_id:   ""
    active:             true

  ANTH-IN:
    name:               "Anthrotic India"
    currency:           "INR"
    functional_currency: "INR"
    primary_controller: "in_controller@anthrotic.com"    # TODO: real email
